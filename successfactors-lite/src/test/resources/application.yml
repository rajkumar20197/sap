# Test Configuration — Uses H2 In-Memory Database
# This file overrides application.yml when running tests (Spring Boot test profile)

spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop       # Let Hibernate create/drop schema for tests
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false                # Disable Flyway for tests (let Hibernate manage schema)

logging:
  level:
    com.sap.sflit: DEBUG
    org.hibernate.SQL: DEBUG
