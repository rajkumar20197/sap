version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sflit-db
    environment:
      POSTGRES_DB: sflit
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sflit"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sflit-api
    ports:
      - "8080:8080"
    environment:
      # Override localhost with the Docker internal network name "postgres"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/sflit
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
